<ion-menu contentId="main-content" type="overlay">
  <ion-content>
    <div class="menu-content">
      <ion-list id="inbox-list">
        <ion-list-header>3D Placer</ion-list-header>
        
        <ion-menu-toggle auto-hide="false" *ngFor="let p of mainMenuItems">
          <ion-item [routerLink]="p.url" routerDirection="root" lines="none" detail="false" routerLinkActive="selected">
            <ion-icon slot="start" [name]="p.icon"></ion-icon>
            <ion-label>{{ p.title }}</ion-label>
          </ion-item>
        </ion-menu-toggle>
      </ion-list>
      
      <ion-list class="bottom-menu-list">
        <ion-menu-toggle auto-hide="false" *ngFor="let p of bottomMenuItems">
          <ion-item [routerLink]="p.url" routerDirection="root" lines="none" detail="false" routerLinkActive="selected">
            <ion-icon slot="start" [name]="p.icon"></ion-icon>
            <ion-label>{{ p.title }}</ion-label>
          </ion-item>
        </ion-menu-toggle>
      </ion-list>
    </div>
  </ion-content>
</ion-menu>

<ion-router-outlet id="main-content"></ion-router-outlet>
