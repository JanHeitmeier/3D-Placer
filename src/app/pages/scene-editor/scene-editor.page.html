<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>{{ sceneName }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="saveScene()">
        <ion-icon slot="icon-only" name="save-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="editor-container">
    <div #threeJsContainer class="threejs-container"></div>
    
    <!-- Toggle button for controls panel with correct arrow direction (matching model editor) -->
    <div class="panel-toggle" (click)="toggleControlPanel()">
      <span *ngIf="!isPanelCollapsed">&gt;</span>
      <span *ngIf="isPanelCollapsed">&lt;</span>
    </div>
    
    <!-- Floating Controls Panel -->
    <div class="floating-controls" [ngClass]="{'collapsed': isPanelCollapsed}">
      <!-- Lighting Controls -->
      <div class="control-section">
        <div class="control-header">
          <ion-label>Lighting</ion-label>
        </div>
        <div class="button-row">
          <ion-button 
            fill="solid" 
            size="small" 
            [color]="currentLighting === 'high-noon' ? 'primary' : 'medium'"
            (click)="setLighting('high-noon')">
            <ion-icon slot="start" name="sunny-outline"></ion-icon>
            High Noon
          </ion-button>
          <ion-button 
            fill="solid" 
            size="small" 
            [color]="currentLighting === 'twilight' ? 'primary' : 'medium'"
            (click)="setLighting('twilight')">
            <ion-icon slot="start" name="partly-sunny-outline"></ion-icon>
            Twilight
          </ion-button>
          <ion-button 
            fill="solid" 
            size="small" 
            [color]="currentLighting === 'night' ? 'primary' : 'medium'"
            (click)="setLighting('night')">
            <ion-icon slot="start" name="moon-outline"></ion-icon>
            Night
          </ion-button>
        </div>
      </div>
      
      <!-- Transform Controls -->
      <div class="control-section" *ngIf="selectedObject">
        <div class="control-header">
          <ion-label>Transform: {{ selectedObjectName }}</ion-label>
          <ion-button fill="clear" size="small" color="danger" (click)="confirmDeleteSelectedObject()">
            <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
          </ion-button>
        </div>
        
        <!-- Location Controls -->
        <div class="transform-group">
          <ion-label class="transform-label">
            <ion-icon name="move-outline"></ion-icon>
            Location
          </ion-label>
          <div class="transform-row">
            <div class="transform-control">
              <ion-button fill="clear" size="small" (click)="adjustTransform('position', 'x', -0.1)">
                &lt;
              </ion-button>
              <ion-input 
                type="number" 
                [(ngModel)]="transformPosition.x" 
                (ionInput)="onTransformInputChange('position', 'x', $event)"
                class="transform-input">
              </ion-input>
              <ion-button fill="clear" size="small" (click)="adjustTransform('position', 'x', 0.1)">
                &gt;
              </ion-button>
            </div>
            <div class="transform-control">
              <ion-button fill="clear" size="small" (click)="adjustTransform('position', 'y', -0.1)">
                &lt;
              </ion-button>
              <ion-input 
                type="number" 
                [(ngModel)]="transformPosition.y" 
                (ionInput)="onTransformInputChange('position', 'y', $event)"
                class="transform-input">
              </ion-input>
              <ion-button fill="clear" size="small" (click)="adjustTransform('position', 'y', 0.1)">
                &gt;
              </ion-button>
            </div>
            <div class="transform-control">
              <ion-button fill="clear" size="small" (click)="adjustTransform('position', 'z', -0.1)">
                &lt;
              </ion-button>
              <ion-input 
                type="number" 
                [(ngModel)]="transformPosition.z" 
                (ionInput)="onTransformInputChange('position', 'z', $event)"
                class="transform-input">
              </ion-input>
              <ion-button fill="clear" size="small" (click)="adjustTransform('position', 'z', 0.1)">
                &gt;
              </ion-button>
            </div>
          </div>
        </div>
        
        <!-- Rotation Controls -->
        <div class="transform-group">
          <ion-label class="transform-label">
            <ion-icon name="refresh-outline"></ion-icon>
            Rotation
          </ion-label>
          <div class="transform-row">
            <div class="transform-control">
              <ion-button fill="clear" size="small" (click)="adjustTransform('rotation', 'x', -5)">
                &lt;
              </ion-button>
              <ion-input 
                type="number" 
                [(ngModel)]="transformRotation.x" 
                (ionInput)="onTransformInputChange('rotation', 'x', $event)"
                class="transform-input">
              </ion-input>
              <ion-button fill="clear" size="small" (click)="adjustTransform('rotation', 'x', 5)">
                &gt;
              </ion-button>
            </div>
            <div class="transform-control">
              <ion-button fill="clear" size="small" (click)="adjustTransform('rotation', 'y', -5)">
                &lt;
              </ion-button>
              <ion-input 
                type="number" 
                [(ngModel)]="transformRotation.y" 
                (ionInput)="onTransformInputChange('rotation', 'y', $event)"
                class="transform-input">
              </ion-input>
              <ion-button fill="clear" size="small" (click)="adjustTransform('rotation', 'y', 5)">
                &gt;
              </ion-button>
            </div>
            <div class="transform-control">
              <ion-button fill="clear" size="small" (click)="adjustTransform('rotation', 'z', -5)">
                &lt;
              </ion-button>
              <ion-input 
                type="number" 
                [(ngModel)]="transformRotation.z" 
                (ionInput)="onTransformInputChange('rotation', 'z', $event)"
                class="transform-input">
              </ion-input>
              <ion-button fill="clear" size="small" (click)="adjustTransform('rotation', 'z', 5)">
                &gt;
              </ion-button>
            </div>
          </div>
        </div>
        
        <!-- Scale Controls -->
        <div class="transform-group">
          <ion-label class="transform-label">
            <ion-icon name="resize-outline"></ion-icon>
            Scale
          </ion-label>
          <div class="transform-row">
            <div class="transform-control">
              <ion-button fill="clear" size="small" (click)="adjustTransform('scale', 'x', -0.1)">
                &lt;
              </ion-button>
              <ion-input 
                type="number" 
                [(ngModel)]="transformScale.x" 
                (ionInput)="onTransformInputChange('scale', 'x', $event)"
                class="transform-input">
              </ion-input>
              <ion-button fill="clear" size="small" (click)="adjustTransform('scale', 'x', 0.1)">
                &gt;
              </ion-button>
            </div>
            <div class="transform-control">
              <ion-button fill="clear" size="small" (click)="adjustTransform('scale', 'y', -0.1)">
                &lt;
              </ion-button>
              <ion-input 
                type="number" 
                [(ngModel)]="transformScale.y" 
                (ionInput)="onTransformInputChange('scale', 'y', $event)"
                class="transform-input">
              </ion-input>
              <ion-button fill="clear" size="small" (click)="adjustTransform('scale', 'y', 0.1)">
                &gt;
              </ion-button>
            </div>
            <div class="transform-control">
              <ion-button fill="clear" size="small" (click)="adjustTransform('scale', 'z', -0.1)">
                &lt;
              </ion-button>
              <ion-input 
                type="number" 
                [(ngModel)]="transformScale.z" 
                (ionInput)="onTransformInputChange('scale', 'z', $event)"
                class="transform-input">
              </ion-input>
              <ion-button fill="clear" size="small" (click)="adjustTransform('scale', 'z', 0.1)">
                &gt;
              </ion-button>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Scene Info -->
      <div class="control-section">
        <div class="control-header">
          <ion-label>Scene Info</ion-label>
        </div>
        <ion-label>Objects: {{ sceneObjectCount }}</ion-label>
        <ion-label>Lighting: {{ currentLighting | titlecase }}</ion-label>
      </div>
    </div>
    
    <!-- Add Model Button (Floating Action Button) -->
    <ion-fab vertical="bottom" horizontal="end" slot="fixed">
      <ion-fab-button color="primary" (click)="showAddModelModal()">
        <ion-icon name="add"></ion-icon>
      </ion-fab-button>
    </ion-fab>
    
    <!-- Control panel section -->
    <div class="control-panel" [class.collapsed]="isPanelCollapsed">
      <div class="panel-header" (click)="toggleControlPanel()">
        <ion-label>Scene Objects ({{ sceneObjectCount }})</ion-label>
        <ion-icon [name]="isPanelCollapsed ? 'chevron-down-outline' : 'chevron-up-outline'"></ion-icon>
      </div>
      <div class="panel-content" *ngIf="!isPanelCollapsed">
        <!-- Object controls will go here -->
      </div>
    </div>
  </div>
</ion-content>

<!-- Delete confirmation alert -->
<ion-alert
  [isOpen]="showDeleteAlert"
  header="Delete Object"
  message="Are you sure you want to delete this object from the scene?"
  [buttons]="deleteAlertButtons"
  (didDismiss)="showDeleteAlert = false">
</ion-alert>
