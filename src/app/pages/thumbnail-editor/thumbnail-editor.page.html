<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/models"></ion-back-button>
    </ion-buttons>
    <ion-title>Create Thumbnail</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="takeThumbnail()">
        <ion-icon slot="icon-only" name="camera"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div #canvasContainer class="canvas-container"></div>
  <div class="controls">
    <ion-range min="0.1" max="5" value="1.5" step="0.1" (ionChange)="onScaleChange($event)">
      <ion-label slot="start">Scale</ion-label>
    </ion-range>
  </div>
</ion-content>
