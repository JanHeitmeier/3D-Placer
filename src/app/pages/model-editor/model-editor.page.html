<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Model Editor</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div *ngIf="model">
    <h2>{{ model.name }}</h2>
    <p>{{ model.id }}</p>
  </div>
  <div *ngIf="!model">
    <p>No model loaded.</p>
  </div>
</ion-content>
